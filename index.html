<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berkley POS - Hotel Point of Sale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#11a54b',
                            light: '#e8f7ee',
                        },
                        accent: {
                            DEFAULT: '#ffd66b',
                            orange: '#ff922b',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    borderRadius: {
                        '3xl': '24px',
                        '2xl': '20px',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(5px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .sidebar-closed {
            transform: translateX(-100%);
            width: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
        }

        .cart-closed {
            transform: translateX(100%);
            width: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
        }

        @media (min-width: 1025px) {
            .sidebar-closed {
                transform: translateX(-20px);
            }

            .cart-closed {
                transform: translateX(20px);
            }
        }
    </style>
</head>

<body class="bg-[#edf2f0] h-screen overflow-hidden text-gray-900 md:p-2.5 p-0">
    <!-- Overlay for mobile sidebars -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden lg:hidden"
        onclick="closeAllSidebars()"></div>

    <!-- Receipt Modal -->
    <div id="receipt-modal"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-[320px] rounded-3xl overflow-hidden shadow-2xl animate-fade-in">
            <div class="p-6 overflow-y-auto max-h-[80vh] hide-scrollbar" id="receipt-content">
                <!-- Receipt content injected by JS -->
            </div>
            <div class="p-4 bg-gray-50 border-t border-gray-100 flex gap-2">
                <button onclick="closeReceipt()"
                    class="flex-1 py-3 bg-white border border-gray-200 text-gray-600 font-bold rounded-xl text-xs hover:bg-gray-100 transition-all">Close</button>
                <button onclick="window.print()"
                    class="flex-1 py-3 bg-primary text-white font-bold rounded-xl text-xs hover:bg-emerald-600 shadow-lg shadow-emerald-200 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="printer" class="w-3.5 h-3.5"></i>Print
                </button>
            </div>
        </div>
    </div>

    <div class="flex h-full gap-2.5 relative">

        <!-- Sidebar Navigation -->
        <aside id="main-sidebar"
            class="fixed lg:static inset-y-0 left-0 w-[200px] bg-white lg:rounded-3xl flex flex-col p-5 shadow-lg lg:shadow-sm border border-gray-100 z-50 transition-all duration-300 sidebar-closed">
            <div class="flex items-center justify-between mb-8 px-1">
                <div class="flex items-center gap-2">
                    <div class="bg-primary text-white w-7 h-7 rounded-lg flex items-center justify-center">
                        <i data-lucide="utensils" class="w-4 h-4"></i>
                    </div>
                    <span class="font-bold text-xs tracking-wider uppercase">Berkley</span>
                </div>
                <button class="lg:hidden text-gray-400 hover:text-primary" onclick="toggleSidebar()">
                    <i data-lucide="x" class="w-5"></i>
                </button>
            </div>

            <nav class="flex-1 flex flex-col gap-1.5 overflow-y-auto hide-scrollbar">
                <a href="#"
                    class="flex items-center gap-3 px-3 py-2.5 text-white bg-primary rounded-xl font-medium transition-all text-sm">
                    <i data-lucide="layout-grid" class="w-4.5 h-4.5"></i>
                    <span>Menu</span>
                </a>
                <a href="#"
                    class="flex items-center gap-3 px-3 py-2.5 text-gray-400 hover:bg-primary-light hover:text-primary rounded-xl font-medium transition-all text-sm">
                    <i data-lucide="door-open" class="w-4.5 h-4.5"></i>
                    <span>Tables</span>
                </a>
                <a href="#"
                    class="flex items-center gap-3 px-3 py-2.5 text-gray-400 hover:bg-primary-light hover:text-primary rounded-xl font-medium transition-all text-sm">
                    <i data-lucide="calendar" class="w-4.5 h-4.5"></i>
                    <span>Reservations</span>
                </a>
                <a href="#"
                    class="flex items-center gap-3 px-3 py-2.5 text-gray-400 hover:bg-primary-light hover:text-primary rounded-xl font-medium transition-all text-sm">
                    <i data-lucide="truck" class="w-4.5 h-4.5"></i>
                    <span>Delivery</span>
                </a>
                <a href="#"
                    class="flex items-center gap-3 px-3 py-2.5 text-gray-400 hover:bg-primary-light hover:text-primary rounded-xl font-medium transition-all text-sm">
                    <i data-lucide="wallet" class="w-4.5 h-4.5"></i>
                    <span>Accounting</span>
                </a>
                <a href="#"
                    class="flex items-center gap-3 px-3 py-2.5 text-gray-400 hover:bg-primary-light hover:text-primary rounded-xl font-medium transition-all text-sm">
                    <i data-lucide="settings" class="w-4.5 h-4.5"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="mt-auto pt-4 border-t border-gray-50 flex flex-col gap-2.5">
                <div class="flex items-center gap-2 p-1.5 bg-gray-50 rounded-xl border border-gray-100">
                    <div
                        class="w-7 h-7 rounded-full bg-[#c7ead4] text-primary flex items-center justify-center font-bold text-[10px] border border-white">
                        PK</div>
                    <p class="text-xs font-semibold truncate">Pio Kerich</p>
                </div>
                <button onclick="logout()"
                    class="flex items-center gap-3 px-3 py-2 text-gray-400 font-medium hover:text-red-500 transition-colors text-xs">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main
            class="flex-1 bg-white md:rounded-3xl flex flex-col overflow-hidden shadow-sm border border-gray-100 min-w-0">
            <header
                class="p-4 px-6 flex justify-between items-center gap-4 bg-white/80 backdrop-blur sticky top-0 z-30">
                <div class="flex items-center gap-4 flex-1">
                    <button
                        class="bg-gray-50 md:w-9 md:h-9 w-8 h-8 rounded-lg flex items-center justify-center hover:bg-gray-100 transition-colors"
                        onclick="toggleSidebar()">
                        <i data-lucide="menu" class="text-gray-600 w-5"></i>
                    </button>
                    <div
                        class="bg-gray-50 flex items-center px-3 rounded-xl gap-2 w-full max-w-[320px] border border-gray-100 focus-within:border-primary-light focus-within:bg-white transition-all">
                        <i data-lucide="search" class="text-gray-400 w-4"></i>
                        <input type="text" placeholder="Search menu..."
                            class="bg-transparent py-2 w-full outline-none text-sm">
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button
                        class="bg-gray-50 w-8 h-8 rounded-lg flex items-center justify-center hover:bg-gray-100 transition-colors">
                        <i data-lucide="sliders-horizontal" class="text-gray-600 w-4"></i>
                    </button>
                    <button
                        class="lg:hidden bg-primary-light text-primary w-8 h-8 rounded-lg flex items-center justify-center shadow-sm"
                        onclick="toggleCart()">
                        <i data-lucide="shopping-cart" class="w-4"></i>
                    </button>
                </div>
            </header>

            <!-- Categories (Scrollable) -->
            <section class="flex gap-4 px-6 pb-6 overflow-x-auto hide-scrollbar whitespace-nowrap scroll-smooth"
                id="category-bar">
                <!-- Categories injected by JS -->
            </section>

            <!-- Product Grid (Now Dynamic) -->
            <section
                class="flex-1 px-6 pb-6 grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4 overflow-y-auto hide-scrollbar content-start"
                id="product-grid">
                <!-- Products will be injected here -->
            </section>

            <!-- Bottom Table Bar -->
            <footer class="p-3 px-6 border-t border-gray-50 bg-[#fbfcfa] hidden sm:block">
                <div class="flex gap-3 hide-scrollbar overflow-x-auto">
                    <div
                        class="flex items-center gap-2.5 bg-white border border-gray-100 px-3 py-1.5 rounded-full cursor-pointer shadow-sm hover:border-primary-light transition-all min-w-max">
                        <div
                            class="w-7 h-7 rounded-full bg-primary-light text-primary flex items-center justify-center font-bold text-[11px]">
                            T1</div>
                        <div>
                            <p class="font-semibold text-[11px]">Jacob Jones</p>
                            <p class="text-[9px] text-gray-400">6 Items → Kitchen</p>
                        </div>
                    </div>
                    <div
                        class="flex items-center gap-2.5 bg-white border border-gray-100 px-3 py-1.5 rounded-full cursor-pointer shadow-sm hover:border-primary-light transition-all min-w-max">
                        <div
                            class="w-7 h-7 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center font-bold text-[11px]">
                            T2</div>
                        <div>
                            <p class="font-semibold text-[11px]">Bessie Co.</p>
                            <p class="text-[9px] text-gray-400">4 Items <span
                                    class="bg-blue-50 text-blue-500 px-1 py-0.5 rounded text-[8px]">In Process</span>
                            </p>
                        </div>
                    </div>
                    <div
                        class="flex items-center gap-2.5 bg-white border border-gray-100 px-3 py-1.5 rounded-full cursor-pointer shadow-sm hover:border-primary-light transition-all min-w-max">
                        <div
                            class="w-7 h-7 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center font-bold text-[11px]">
                            T5</div>
                        <div>
                            <p class="font-semibold text-[11px]">Arlene McCoy</p>
                            <p class="text-[9px] text-gray-400">2 Items <span
                                    class="bg-emerald-100 text-emerald-700 px-1 py-0.5 rounded text-[8px]">Ready</span>
                            </p>
                        </div>
                    </div>
                </div>
            </footer>
        </main>

        <!-- Right Order Panel -->
        <aside id="order-panel"
            class="fixed lg:static inset-y-0 right-0 w-[300px] bg-white lg:rounded-3xl flex flex-col p-5 shadow-lg lg:shadow-sm border border-gray-100 z-50 transition-all duration-300 cart-closed">
            <div class="flex justify-between items-center mb-5 lg:mb-6">
                <div>
                    <h2 class="text-base font-bold">Table 4</h2>
                    <p class="text-[10px] text-gray-400">Pio Kerich</p>
                </div>
                <div class="flex items-center gap-2">
                    <button class="bg-gray-50 p-1.5 rounded-lg text-gray-400 hover:text-primary transition-colors"><i
                            data-lucide="pencil" class="w-3.5"></i></button>
                    <button class="lg:hidden text-gray-400 hover:text-primary" onclick="toggleCart()">
                        <i data-lucide="x" class="w-5"></i>
                    </button>
                </div>
            </div>

            <div class="bg-gray-50 p-1 rounded-xl flex mb-5 border border-gray-100/50" id="order-mode-toggles">
                <button onclick="setOrderMode('DINE IN')"
                    class="order-mode-btn flex-1 py-1.5 text-[10px] font-bold rounded-lg bg-white shadow-sm transition-all"
                    data-mode="DINE IN">DINE IN</button>
                <button onclick="setOrderMode('TAKE AWAY')"
                    class="order-mode-btn flex-1 py-1.5 text-[10px] font-bold rounded-lg text-gray-400 hover:text-gray-600 transition-all"
                    data-mode="TAKE AWAY">TAKE AWAY</button>
                <button onclick="setOrderMode('DELIVERY')"
                    class="order-mode-btn flex-1 py-1.5 text-[10px] font-bold rounded-lg text-gray-400 hover:text-gray-600 transition-all"
                    data-mode="DELIVERY">DELIVERY</button>
            </div>

            <div class="flex-1 overflow-y-auto pr-1 flex flex-col gap-4 mb-4 hide-scrollbar" id="cart-items">
                <!-- Shopping cart items -->
            </div>

            <div class="pt-3 border-t border-dashed border-gray-100 text-xs text-gray-500">
                <div class="flex justify-between mb-2"><span>Sub Total</span><span id="sub-total"
                        class="font-semibold font-mono">$0.00</span></div>
                <div class="flex justify-between mb-2"><span>Service Tax (5%)</span><span id="tax-amount"
                        class="font-semibold font-mono">$0.00</span></div>
                <div class="h-px bg-gray-50 my-3"></div>
                <div class="flex justify-between text-base font-bold text-gray-900 mb-5"><span>Total Amount</span><span
                        id="total-amount" class="text-primary font-mono">$0.00</span></div>
            </div>

            <div class="grid grid-cols-3 gap-2 mb-5" id="payment-mode-toggles">
                <button onclick="setPaymentMode('CASH')"
                    class="payment-mode-btn flex flex-col items-center gap-1.5 p-2 bg-primary-light border border-primary rounded-xl transition-all"
                    data-pay="CASH">
                    <i data-lucide="banknote" class="w-4 text-primary"></i><span
                        class="text-[8px] font-bold text-primary uppercase">Cash</span>
                </button>
                <button onclick="setPaymentMode('CARD')"
                    class="payment-mode-btn flex flex-col items-center gap-1.5 p-2 bg-gray-50 border border-gray-50 rounded-xl hover:border-gray-200 transition-all"
                    data-pay="CARD">
                    <i data-lucide="credit-card" class="w-4 text-gray-400"></i><span
                        class="text-[8px] font-bold text-gray-400 uppercase">Card</span>
                </button>
                <button onclick="setPaymentMode('QR')"
                    class="payment-mode-btn flex flex-col items-center gap-1.5 p-2 bg-gray-50 border border-gray-50 rounded-xl hover:border-gray-200 transition-all"
                    data-pay="QR">
                    <i data-lucide="qr-code" class="w-4 text-gray-400"></i><span
                        class="text-[8px] font-bold text-gray-400 uppercase">QR</span>
                </button>
            </div>

            <button onclick="placeOrder()"
                class="w-full bg-primary hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-emerald-600/20 flex items-center justify-center gap-2 text-sm">
                Place Order
            </button>
        </aside>
    </div>

    <script src="assets/js/script.js"></script>
</body>

</html>
