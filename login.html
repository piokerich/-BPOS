<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Berkley POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#11a54b',
                            light: '#e8f7ee',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f1f5f9;
            background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0, transparent 50%);
            min-height: screen;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body class="p-6">
    <div class="w-full max-w-[400px] login-card rounded-[32px] p-8 md:p-10 relative animate-fade-in">
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div
                class="bg-primary text-white w-16 h-16 rounded-[20px] flex items-center justify-center mx-auto mb-4 shadow-xl shadow-emerald-100">
                <i data-lucide="utensils" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-black text-gray-900 tracking-tight">Berkley POS</h1>
            <p class="text-gray-500 font-bold text-sm mt-2">Hotel Management Portal</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-5">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">User
                    Identification</label>
                <div class="relative group">
                    <i data-lucide="user"
                        class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 group-focus-within:text-primary transition-colors"></i>
                    <input type="text" id="username" required placeholder="Enter username"
                        class="w-full bg-gray-50 border-2 border-transparent rounded-xl py-4 pl-12 pr-6 text-base font-bold text-gray-800 outline-none focus:border-primary focus:bg-white transition-all">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">Security
                    Password</label>
                <div class="relative group">
                    <i data-lucide="lock"
                        class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 group-focus-within:text-primary transition-colors"></i>
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full bg-gray-50 border-2 border-transparent rounded-xl py-4 pl-12 pr-6 text-base font-bold text-gray-800 outline-none focus:border-primary focus:bg-white transition-all">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-primary hover:bg-emerald-600 text-white font-black text-base py-4 rounded-xl transition-all shadow-xl shadow-emerald-200 flex items-center justify-center gap-2 mt-4 group">
                Sign In to System
                <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>

        <p class="text-center text-[10px] font-black text-gray-400 mt-8 tracking-wide uppercase">
            Authorized Personnel Only
        </p>
    </div>

    <script src="assets/js/login.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
